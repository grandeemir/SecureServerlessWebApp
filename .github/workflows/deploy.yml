name: "Deploy App"

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: "Deploy Infrastructure and Frontend"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "us-east-1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: ./environments/DEV

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./environments/DEV

      - name: Get Terraform Outputs
        id: tf_outputs
        run: |
          echo "USER_POOL_ID=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_OUTPUT
          echo "USER_POOL_CLIENT_ID=$(terraform output -raw cognito_client_id)" >> $GITHUB_OUTPUT
          echo "COGNITO_DOMAIN=$(terraform output -raw cognito_domain)" >> $GITHUB_OUTPUT
          echo "API_ENDPOINT=$(terraform output -raw api_endpoint)" >> $GITHUB_OUTPUT
          echo "BUCKET_NAME=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT
          echo "CF_DIST_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
        working-directory: ./environments/DEV

      - name: Configure Frontend
        run: |
          sed -i "s/\${user_pool_id}/${{ steps.tf_outputs.outputs.USER_POOL_ID }}/g" scripts/website/config.js
          sed -i "s/\${user_pool_client_id}/${{ steps.tf_outputs.outputs.USER_POOL_CLIENT_ID }}/g" scripts/website/config.js
          sed -i "s/\${cognito_domain}/${{ steps.tf_outputs.outputs.COGNITO_DOMAIN }}/g" scripts/website/config.js
          sed -i "s|\${api_endpoint}|${{ steps.tf_outputs.outputs.API_ENDPOINT }}|g" scripts/website/config.js
        # Note: using | as separator for api_endpoint because it contains slashes

      - name: Deploy Frontend to S3
        run: |
          aws s3 sync scripts/website/ s3://${{ steps.tf_outputs.outputs.BUCKET_NAME }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ steps.tf_outputs.outputs.CF_DIST_ID }} --paths "/*"
