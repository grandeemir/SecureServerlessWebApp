<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - AetherVault</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Amazon Cognito Identity JS from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.3/dist/amazon-cognito-identity.min.js"></script>
</head>
<body class="auth-page-body">
    <div class="auth-container">
        <div class="logo auth-logo text-center">
            <h1><a href="index.html">
                <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#paint0_linear)"/>
                  <path d="M2 17L12 22L22 17" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M2 12L12 17L22 12" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <defs>
                    <linearGradient id="paint0_linear" x1="12" y1="2" x2="12" y2="12" gradientUnits="userSpaceOnUse">
                      <stop stop-color="#3b82f6"/>
                      <stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient>
                    <linearGradient id="paint1_linear" x1="12" y1="17" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                      <stop stop-color="#3b82f6"/>
                      <stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient>
                    <linearGradient id="paint2_linear" x1="12" y1="12" x2="12" y2="17" gradientUnits="userSpaceOnUse">
                      <stop stop-color="#3b82f6"/>
                      <stop offset="1" stop-color="#8b5cf6"/>
                    </linearGradient>
                  </defs>
                </svg>
                AetherVault
            </a></h1>
        </div>

        <!-- Authentication Section -->
        <section id="auth-section">
            <div class="auth-box">
                <h2 id="auth-title">Sign In</h2>
                
                <form id="auth-form">
                    <div class="form-group hidden" id="email-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>
                    
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    
                    <div id="auth-error" class="error-message"></div>

                    <button type="submit" id="auth-submit-btn" class="btn primary full-width">Sign In</button>
                </form>

                <div class="auth-switch">
                    <p id="auth-switch-text">Don't have an account? <a href="#" id="switch-to-signup">Sign Up</a></p>
                </div>
            </div>

            <!-- Verification Box (Hidden by default) -->
            <div id="verify-box" class="auth-box hidden">
                <h2>Verify Account</h2>
                <p class="text-center" style="margin-bottom: 15px; color: var(--text-secondary);">Enter the verification code sent to your email.</p>
                <form id="verify-form">
                    <div class="form-group">
                        <label for="verify-code">Verification Code</label>
                        <input type="text" id="verify-code" placeholder="Enter code" required>
                    </div>
                    <div id="verify-error" class="error-message"></div>
                    <button type="submit" class="btn primary full-width">Verify</button>
                </form>
            </div>
        </section>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
