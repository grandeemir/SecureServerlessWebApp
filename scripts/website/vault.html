<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vault - AetherVault</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Amazon Cognito Identity JS from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.3/dist/amazon-cognito-identity.min.js"></script>
</head>
<body class="vault-page-body">
    <div id="app-container">
        <header>
            <div class="logo">
                <h1><a href="index.html">
                    <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#paint0_linear)"/>
                      <path d="M2 17L12 22L22 17" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M2 12L12 17L22 12" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      <defs>
                        <linearGradient id="paint0_linear" x1="12" y1="2" x2="12" y2="12" gradientUnits="userSpaceOnUse">
                          <stop stop-color="#3b82f6"/>
                          <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                        <linearGradient id="paint1_linear" x1="12" y1="17" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                          <stop stop-color="#3b82f6"/>
                          <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                        <linearGradient id="paint2_linear" x1="12" y1="12" x2="12" y2="17" gradientUnits="userSpaceOnUse">
                          <stop stop-color="#3b82f6"/>
                          <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                      </defs>
                    </svg>
                    AetherVault
                </a></h1>
            </div>
            <div id="user-info">
                <span id="welcome-message">Loading...</span>
                <button id="logout-btn" class="btn secondary">Logout</button>
            </div>
        </header>

        <main>
            <!-- Vault Section -->
            <section id="vault-section">
                <div class="vault-controls">
                    <div class="upload-area">
                        <input type="file" id="file-upload" class="file-input">
                        <label for="file-upload" class="btn primary">Select File</label>
                        <span id="selected-file-name">No file selected</span>
                        <button id="upload-btn" class="btn success" disabled>Upload to Vault</button>
                    </div>
                    <div id="upload-progress" class="hidden">
                        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                        <span id="progress-text">0%</span>
                    </div>
                </div>

                <div class="file-list-container">
                    <h2>Your Secure Files</h2>
                    <table id="file-table">
                        <thead>
                            <tr>
                                <th>File Name</th>
                                <th>Size</th>
                                <th>Uploaded At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="file-list-body">
                            <!-- File items will be populated here by JS -->
                            <tr>
                                <td colspan="4" class="empty-state">Loading your files...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="vault.js"></script>
</body>
</html>
